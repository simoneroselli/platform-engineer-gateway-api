apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-engine
  namespace: processing-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-engine
  template:
    metadata:
      labels:
        app: worker-engine
    spec:
      containers:
      - name: processor
        image: redis:alpine
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"