apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-engine-route
  namespace: processing-pipeline
spec:
  parentRefs:
  - name: cluster-gateway
    namespace: gateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: api-engine-svc
      port: 80