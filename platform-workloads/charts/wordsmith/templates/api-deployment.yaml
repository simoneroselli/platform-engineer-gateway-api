apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wordsmith.fullname" . }}-api
  namespace: wordsmith-app
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "wordsmith.fullname" . }}-api
  template:
    metadata:
      labels:
        app: {{ include "wordsmith.fullname" . }}-api
    spec:
      containers:
      - name: api
        image: {{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: wordsmith-app
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: wordsmith-api