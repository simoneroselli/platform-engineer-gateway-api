apiVersion: v1
kind: ServiceAccount
metadata:
  name: wordsmith-operator-sa
  namespace: wordsmith-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wordsmith-operator-role
rules:
  - apiGroups: ["padre.maronno"]
    resources: ["wordsmithapps", "wordsmithapps/status"]
    verbs: ["get", "list", "watch", "patch", "update", "create"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list", "watch", "update", "delete", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "watch", "update", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wordsmith-operator-binding
subjects:
  - kind: ServiceAccount
    name: wordsmith-operator-sa
    namespace: wordsmith-app
roleRef:
  kind: ClusterRole
  name: wordsmith-operator-role
  apiGroup: rbac.authorization.k8s.io