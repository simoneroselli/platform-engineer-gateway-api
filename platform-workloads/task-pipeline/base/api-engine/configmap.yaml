apiVersion: v1
kind: ConfigMap
metadata:
  name: api-engine-config
  namespace: processing-pipeline
data:
  default.conf: |
    server {
        listen       80;
        listen  [::]:80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }

        # Mocking our task ingestion endpoint
        location /tasks {
            default_type application/json;
            return 200 '{"status": "queued", "message": "Task received successfully", "broker_signature": "mock-broker-ack-9912"}';
        }

        # Mocking an application health status path
        location /healthz {
            default_type application/json;
            return 200 '{"status": "UP", "engine": "api-edge"}';
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }