apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-engine
  namespace: processing-pipeline
  labels:
    app: api-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-engine
  template:
    metadata:
      labels:
        app: api-engine
    spec:
      containers:
      - name: web-server
        image: nginx:alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: nginx-config-vol
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: nginx-config-vol
        configMap:
          name: api-engine-config