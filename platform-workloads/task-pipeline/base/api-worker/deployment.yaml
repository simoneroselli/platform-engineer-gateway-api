apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-worker
  namespace: processing-pipeline
  labels:
    app: api-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-worker
  template:
    metadata:
      labels:
        app: api-worker
    spec:
      containers:
      - name: processor-worker
        image: redis:alpine
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh"]
        args:
        - "-c"
        - "while true; do echo '[worker] checking task queue...'; sleep 10; done"
        resources:
          limits:
            cpu: "200m"
            memory: "128Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"