apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: operators-task-pipeline
  namespace: argocd
spec:
  project: default
  source:
    # Target your personal github repo directory where the manifests live
    repoURL: 'https://github.com/simoneroselli/platform-engineer-gateway-api.git'
    targetRevision: HEAD
    path: platform-workloads/operators/wordsmith-ops
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: processing-pipeline
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
